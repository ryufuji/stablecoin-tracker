coingecko:
  coins: [tether, usd-coin, dai, usd0, jpyc]
  peg_threshold: 0.005  # 0.5%

# JPYC is a JPY-pegged stablecoin (target: ~¥1 = ~$0.0067)
jpyc:
  peg_target_jpy: 1.0
  peg_threshold_pct: 1.0  # 1%

ai:
  model: claude-haiku-4-5-20251001
  max_tokens_per_article: 1000

obsidian:
  export_min_importance: 4
  export_dir: exports/
